name: publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.3)"
        required: true
        type: string
      changelog:
        description: "Release notes / changelog"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version }}

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            formats: "deb,appimage"
          - os: windows-latest
            target: win
            formats: "wix"
          - os: macos-15
            target: mac
            formats: "dmg,app"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Update Version in Cargo.toml
        shell: bash
        run: |
          perl -0pi -e 's/(^version = ")[^"]+(")/${1}${{ inputs.version }}${2}/m' Cargo.toml

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libdbus-1-dev pkg-config libssl-dev

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Clean up macOS resources
        if: runner.os == 'macOS'
        run: |
          # Kill any lingering processes that might hold file locks
          pkill -f hdiutil || true
          pkill -f create-dmg || true
          # Clear temporary files
          rm -rf /tmp/*.dmg /var/tmp/*.dmg

      - name: Build and Package
        run: cargo packager --release --formats ${{ matrix.formats }}
      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build and Package
        run: cargo packager --release --formats ${{ matrix.formats }}

      - uses: actions/upload-artifact@v4
        with:
          name: echo-${{ matrix.target }}
          path: |
            target/release/*.msi
            target/release/*.dmg
            target/release/*.deb
            target/release/*.AppImage
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          mkdir -p release-assets
          test -d artifacts
          find artifacts -type f -exec cp -v {} release-assets/ \;
          test "$(find release-assets -type f | wc -l)" -gt 0

          if [ -n "$CHANGELOG" ]; then
            gh release create v${{ inputs.version }} \
              --title "v${{ inputs.version }}" \
              --notes "$CHANGELOG" \
              --target ${{ github.ref_name }} \
              release-assets/*
          else
            gh release create v${{ inputs.version }} \
              --title "v${{ inputs.version }}" \
              --generate-notes \
              --target ${{ github.ref_name }} \
              release-assets/*
          fi
